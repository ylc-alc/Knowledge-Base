name: Ingest Markdown Notes to Notion

on:
  push:
    paths:
      - 'pending/**/*.md'
      - 'pending/*.md'
      - 'process_notes.py'
      - '.github/workflows/main.yml'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest notes into Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python process_notes.py

      - name: Commit processed, failed, and manifest updates
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add processed failed manifests pending
          git commit -m "Update note ingest outputs"
          git push
