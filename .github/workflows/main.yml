name: Knowledge Ingestion

on:
  push:
    paths:
      - "pending/md/*.md"
      - "pending/md/**/*.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: knowledge-base-ingest
  cancel-in-progress: false

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish pending markdown notes to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Optional overrides if your database property names differ
          NOTION_TITLE_PROPERTY: "Name"
          NOTION_CATEGORY_PROPERTY: "Category"
          NOTION_TAG_PROPERTY: "Tag"
          # Optional extra properties. Leave unset if your database does not have them.
          # NOTION_SOURCE_FILE_PROPERTY: "Source File"
          # NOTION_SOURCE_MODEL_PROPERTY: "Source Model"
        run: python process_notes.py

      - name: Commit changes
        run: |
          git config --global user.name "Automation Bot"
          git config --global user.email "bot@github.com"
          git add pending processed failed manifests
          git commit -m "Archive processed markdown notes" || exit 0
          git push
